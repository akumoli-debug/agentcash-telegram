# Local/demo compose. Not production custody. Uses SQLite and local locks.

services:
  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_PROVIDER: sqlite
      DATABASE_PATH: /app/.data/agentcash-telegram.db
      LOCK_PROVIDER: local
      AUDIT_SINK: file
      AUDIT_STRICT_MODE: "false"
      AUDIT_FILE_PATH: /app/.data/audit-events.jsonl
      AGENTCASH_COMMAND: npx
      AGENTCASH_ARGS: agentcash@0.14.3
      AGENTCASH_HOME_ROOT: /app/data/agentcash-homes
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: 3001
      SKIP_AGENTCASH_HEALTHCHECK: ${SKIP_AGENTCASH_HEALTHCHECK:-true}
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - agentcash-data:/app/.data
      - agentcash-homes:/app/data/agentcash-homes
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  audit-sink-mock:
    image: mendhak/http-https-echo:35
    profiles: ["audit-mock"]
    ports:
      - "8080:8080"

volumes:
  agentcash-data:
  agentcash-homes:
