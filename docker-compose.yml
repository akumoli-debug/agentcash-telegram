# Scaffold-only compose file for local dependency experiments.
# The application runtime is intentionally not defined here.
# Use docker-compose.demo.yml for the local demo app.

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres-scaffold"]
    environment:
      POSTGRES_DB: agentcash
      POSTGRES_USER: agentcash
      POSTGRES_PASSWORD: agentcash
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcash -d agentcash"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
