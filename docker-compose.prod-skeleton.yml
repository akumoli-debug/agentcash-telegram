# Production skeleton only. This is not custody-ready and is not a runnable
# production claim until Postgres repository wiring and remote custody exist.

services:
  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_PROVIDER: postgres
      DATABASE_URL: ${DATABASE_URL:?set a managed Postgres URL}
      LOCK_PROVIDER: redis
      REDIS_URL: ${REDIS_URL:?set a managed Redis URL}
      AUDIT_SINK: http
      AUDIT_STRICT_MODE: "true"
      AUDIT_HTTP_ENDPOINT: ${AUDIT_HTTP_ENDPOINT:?set an external audit sink}
      CUSTODY_MODE: remote_signer
      REMOTE_SIGNER_URL: ${REMOTE_SIGNER_URL:?set a reviewed signer URL}
      AGENTCASH_COMMAND: npx
      AGENTCASH_ARGS: agentcash@0.14.3
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: 3001
      SKIP_AGENTCASH_HEALTHCHECK: "false"
    ports:
      - "3000:3000"
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
